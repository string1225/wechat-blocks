<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>和AI一起消方块</title>
    <link rel="icon" type="image/png" href="assets/app-avatar.png" />
    <style>
      :root {
        color: #182024;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        font-size: 16px;
        letter-spacing: 0;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #app {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        background: #eef4ef;
      }

      #app {
        position: relative;
        touch-action: none;
      }

      #game-canvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
      }

      .hud {
        pointer-events: none;
        position: absolute;
        inset: 0;
        display: grid;
        grid-template-rows: auto 1fr auto;
        padding: max(14px, env(safe-area-inset-top)) 14px max(16px, env(safe-area-inset-bottom));
      }

      .topbar,
      .toolbar,
      .difficulty-stepper,
      .zoom-controls {
        pointer-events: auto;
      }

      .topbar {
        display: grid;
        grid-template-columns: minmax(128px, auto) minmax(0, 1fr);
        gap: 10px;
        align-items: center;
      }

      .brand {
        display: inline-grid;
        min-width: 0;
        height: 42px;
        grid-template-columns: 32px minmax(0, auto);
        gap: 8px;
        align-items: center;
        border: 1px solid rgba(24, 32, 36, 0.14);
        border-radius: 8px;
        padding: 4px 10px 4px 5px;
        background: rgba(255, 255, 255, 0.78);
        box-shadow: 0 8px 22px rgba(39, 57, 49, 0.1);
        backdrop-filter: blur(12px);
      }

      .brand img {
        width: 32px;
        height: 32px;
        border-radius: 8px;
      }

      .brand span {
        overflow: hidden;
        color: #182024;
        font-size: 0.88rem;
        font-weight: 850;
        line-height: 1;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .stats {
        display: flex;
        min-width: 0;
        gap: 8px;
        align-items: center;
        overflow-x: auto;
        scrollbar-width: none;
      }

      .stats::-webkit-scrollbar {
        display: none;
      }

      .chip {
        display: inline-flex;
        min-width: 58px;
        height: 34px;
        align-items: center;
        justify-content: center;
        gap: 5px;
        border: 1px solid rgba(24, 32, 36, 0.14);
        border-radius: 8px;
        padding: 0 10px;
        background: rgba(255, 255, 255, 0.74);
        color: #182024;
        font-size: 0.82rem;
        font-weight: 700;
        backdrop-filter: blur(12px);
        white-space: nowrap;
      }

      .chip strong {
        font-size: 0.96rem;
      }

      .stars {
        color: #d68c12;
      }

      .difficulty-stepper {
        display: inline-grid;
        flex: 0 0 auto;
        grid-template-columns: 34px auto 34px;
        gap: 6px;
        align-items: center;
      }

      .difficulty-stepper .icon-button {
        width: 34px;
        height: 34px;
        box-shadow: none;
      }

      .difficulty-chip {
        min-width: 76px;
      }

      .icon-button {
        appearance: none;
        display: inline-flex;
        width: 42px;
        height: 42px;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(24, 32, 36, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        color: #182024;
        box-shadow: 0 8px 22px rgba(39, 57, 49, 0.12);
        cursor: pointer;
        backdrop-filter: blur(12px);
      }

      .icon-button:disabled {
        cursor: default;
        opacity: 0.42;
      }

      .icon-button[data-active="true"] {
        background: #1f9a77;
        color: #ffffff;
      }

      .icon-button svg {
        width: 19px;
        height: 19px;
        stroke-width: 2.3;
      }

      .zoom-controls {
        position: absolute;
        right: 14px;
        top: 50%;
        display: grid;
        gap: 8px;
        transform: translateY(-50%);
      }

      .zoom-controls .icon-button {
        width: 38px;
        height: 38px;
        background: rgba(255, 255, 255, 0.76);
      }

      .toolbar {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 10px;
      }

      .tool-button {
        appearance: none;
        display: grid;
        min-width: 0;
        height: 58px;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 8px;
        align-items: center;
        border: 1px solid rgba(24, 32, 36, 0.14);
        border-radius: 8px;
        padding: 0 10px;
        background: rgba(255, 255, 255, 0.84);
        color: #182024;
        box-shadow: 0 10px 26px rgba(39, 57, 49, 0.14);
        cursor: pointer;
        backdrop-filter: blur(14px);
      }

      .tool-button:disabled {
        cursor: default;
        opacity: 0.46;
      }

      .tool-button svg {
        width: 20px;
        height: 20px;
        stroke-width: 2.35;
      }

      .tool-copy {
        display: grid;
        min-width: 0;
        text-align: left;
      }

      .tool-copy b {
        overflow: hidden;
        font-size: 0.86rem;
        line-height: 1.05;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .tool-copy span {
        color: rgba(24, 32, 36, 0.62);
        font-size: 0.72rem;
        font-weight: 700;
      }

      .toast {
        pointer-events: none;
        position: absolute;
        left: 50%;
        top: 50%;
        min-width: 140px;
        transform: translate(-50%, -50%) scale(0.94);
        border-radius: 8px;
        padding: 12px 16px;
        background: rgba(24, 32, 36, 0.82);
        color: #ffffff;
        font-size: 0.9rem;
        font-weight: 800;
        opacity: 0;
        text-align: center;
        transition:
          opacity 160ms ease,
          transform 160ms ease;
      }

      .toast[data-visible="true"] {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      .result {
        pointer-events: auto;
        position: absolute;
        inset: 0;
        display: none;
        place-items: center;
        padding: 20px;
        background: rgba(24, 32, 36, 0.24);
        backdrop-filter: blur(8px);
      }

      .result[data-visible="true"] {
        display: grid;
      }

      .result-panel {
        width: min(340px, 100%);
        border: 1px solid rgba(24, 32, 36, 0.12);
        border-radius: 8px;
        padding: 20px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 22px 60px rgba(24, 32, 36, 0.22);
        text-align: center;
      }

      .result-panel h1 {
        margin: 0 0 8px;
        font-size: 1.45rem;
        line-height: 1.2;
      }

      .result-panel p {
        margin: 0 0 18px;
        color: rgba(24, 32, 36, 0.72);
        font-weight: 700;
      }

      .result-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .text-button {
        appearance: none;
        height: 44px;
        border: 0;
        border-radius: 8px;
        background: #1f9a77;
        color: #ffffff;
        font-weight: 850;
        cursor: pointer;
      }

      .text-button.secondary {
        background: #edf1ea;
        color: #182024;
      }

      @media (max-width: 560px) {
        .hud {
          padding-inline: 10px;
        }

        .topbar {
          grid-template-columns: minmax(0, 1fr) auto;
        }

        .brand {
          grid-column: 1 / -1;
          width: fit-content;
          max-width: min(100%, 220px);
        }

        .zoom-controls {
          right: 10px;
        }

        .chip {
          min-width: 50px;
          padding-inline: 8px;
          font-size: 0.76rem;
        }

        .difficulty-stepper {
          gap: 4px;
          grid-template-columns: 32px auto 32px;
        }

        .difficulty-stepper .icon-button {
          width: 32px;
          height: 32px;
        }

        .difficulty-chip {
          min-width: 66px;
        }

        .toolbar {
          gap: 7px;
        }

        .tool-button {
          height: 54px;
          grid-template-columns: 1fr;
          justify-items: center;
          gap: 3px;
          padding: 5px 4px;
        }

        .tool-copy {
          text-align: center;
        }

        .tool-copy b {
          font-size: 0.72rem;
        }

        .tool-copy span {
          font-size: 0.66rem;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game-canvas" aria-label="和AI一起消方块"></canvas>
      <div class="hud" id="hud">
        <header class="topbar">
          <div class="brand" aria-label="和AI一起消方块">
            <img src="assets/app-avatar.png" alt="" />
            <span>和AI一起消方块</span>
          </div>
          <div class="stats" aria-live="polite">
            <div class="difficulty-stepper" aria-label="难度等级">
              <button class="icon-button" id="hud-difficulty-prev" type="button" title="降低难度">
                <i data-lucide="chevron-left"></i>
              </button>
              <span class="chip difficulty-chip">难度 <strong id="hud-difficulty">1</strong></span>
              <button class="icon-button" id="hud-difficulty-next" type="button" title="提高难度">
                <i data-lucide="chevron-right"></i>
              </button>
            </div>
            <span class="chip">剩余 <strong id="hud-left">0</strong></span>
            <span class="chip stars" id="hud-stars">---</span>
          </div>
        </header>
        <footer class="toolbar">
          <button class="tool-button" id="hud-reset" type="button">
            <i data-lucide="refresh-ccw"></i>
            <span class="tool-copy"><b>重置</b><span id="hud-reset-count">不限</span></span>
          </button>
          <button class="tool-button" id="hud-undo" type="button">
            <i data-lucide="undo-2"></i>
            <span class="tool-copy"><b>撤销</b><span id="hud-undo-count">5</span></span>
          </button>
          <button class="tool-button" id="hud-bomb" type="button">
            <i data-lucide="bomb"></i>
            <span class="tool-copy"><b>炸弹</b><span id="hud-bomb-count">3</span></span>
          </button>
          <button class="tool-button" id="hud-auto" type="button">
            <i data-lucide="play"></i>
            <span class="tool-copy"><b>自动</b><span id="hud-auto-state">关闭</span></span>
          </button>
        </footer>
      </div>
      <div class="zoom-controls" aria-label="缩放">
        <button class="icon-button" id="hud-zoom-in" type="button" title="放大">
          <i data-lucide="zoom-in"></i>
        </button>
        <button class="icon-button" id="hud-zoom-out" type="button" title="缩小">
          <i data-lucide="zoom-out"></i>
        </button>
      </div>
      <div class="toast" id="toast"></div>
      <section class="result" id="result">
        <div class="result-panel">
          <h1 id="result-title">过关</h1>
          <p id="result-copy">---</p>
          <div class="result-actions">
            <button class="text-button secondary" id="result-retry" type="button">重玩</button>
            <button class="text-button" id="result-next" type="button">下一难度</button>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
